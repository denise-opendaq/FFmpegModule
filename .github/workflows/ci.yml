name: Build and Test

on:
  workflow_dispatch:
    inputs:
      opendaq_ref:
        description: "openDAQ SDK commit, branch or tag"
        required: false
        default: ""
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            generator: Ninja
            build_type: Debug
          - os: ubuntu-latest
            generator: Ninja
            build_type: Release
          - os: ubuntu-24.04-arm
            generator: Ninja
            build_type: Debug
          - os: ubuntu-24.04-arm
            generator: Ninja
            build_type: Release
          - os: macos-latest
            generator: Ninja
            build_type: Debug
          - os: macos-latest
            generator: Ninja
            build_type: Release
          - os: windows-2022
            generator: "Visual Studio 17 2022"
            build_type: Debug
          - os: windows-2022
            generator: "Visual Studio 17 2022"
            build_type: Release

    runs-on: ${{ matrix.os }}

    steps:
      - name: Install Linux build dependencies (openDAQ's RTGen needs mono; FFmpeg-from-source needs a toolchain + pkg-config)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential pkg-config mono-runtime libmono-system-json-microsoft4.0-cil libmono-system-data4.0-cil

      - name: Install macOS build dependencies (openDAQ's RTGen needs mono)
        if: matrix.os == 'macos-latest'
        run: brew install mono

      - name: Set up MSVC dev environment (Windows only)
        if: matrix.os == 'windows-2022'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Checkout project repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.event.client_payload.branch || github.ref }}

      - name: Overwrite opendaq_ref
        if: ${{ github.event.inputs.opendaq_ref != '' }}
        run: echo "${{ github.event.inputs.opendaq_ref }}" > opendaq_ref

      - name: Configure project with CMake
        run: cmake -B build/output -S . -G "${{ matrix.generator }}" -DDAQMODULES_FFMPEG_ENABLE_TESTS=ON -DDAQMODULES_FFMPEG_DEBUG_WARNINGS_AS_ERRORS=ON -DOPENDAQ_DEBUG_WARNINGS_AS_ERRORS=ON -DCMAKE_BUILD_TYPE="${{ matrix.build_type }}"

      - name: Build project with CMake
        run: cmake --build build/output --config "${{ matrix.build_type }}"

      - name: Run project tests with CMake
        id: run_tests
        run: ctest --test-dir build/output --output-on-failure -C "${{ matrix.build_type }}"

      # Temporary diagnostic: ctest only reports "SegFault" with no stack trace, and the
      # TranscodesToJpeg crash hasn't reproduced under gdb/valgrind on other architectures, so
      # capture a real backtrace from the environment where it actually happens instead of
      # guessing blind. Remove once the crash is understood and fixed.
      - name: On test failure (Linux), re-run the crashing binary under gdb for a backtrace
        if: failure() && startsWith(matrix.os, 'ubuntu') && steps.run_tests.outcome == 'failure'
        run: |
          command -v gdb >/dev/null || sudo apt-get install -y --no-install-recommends gdb
          test_bin=$(find build/output -maxdepth 6 -type f -name test_video_device_module | head -1)
          if [ -z "$test_bin" ]; then
            echo "test_video_device_module binary not found, skipping gdb diagnostics"
            exit 0
          fi
          echo "Re-running $test_bin under gdb to capture a backtrace..."
          gdb -q -batch \
            -ex run \
            -ex "thread apply all bt full" \
            -ex quit \
            --args "$test_bin"

      - name: Collect video_device_module artifact
        if: success()
        shell: bash
        run: |
          mkdir -p "${{ runner.temp }}/video_device_module"
          module_file=$(find build/output -type f \( -name 'libvideo_device_module*.module.*' -o -name 'video_device_module*.module.*' \) | head -1)
          if [ -z "$module_file" ]; then
            echo "::error::video_device_module binary not found under build/output"
            exit 1
          fi
          echo "Found module: $module_file"
          cp -v "$module_file" "${{ runner.temp }}/video_device_module/"

      - name: Upload video_device_module
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: video_device_module-${{ matrix.os }}-${{ matrix.build_type }}
          path: ${{ runner.temp }}/video_device_module/*
          if-no-files-found: error
          retention-days: 14

  install-build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            generator: Ninja
            build_type: Debug
          - os: ubuntu-latest
            generator: Ninja
            build_type: Release
          - os: ubuntu-24.04-arm
            generator: Ninja
            build_type: Debug
          - os: ubuntu-24.04-arm
            generator: Ninja
            build_type: Release
          - os: macos-latest
            generator: Ninja
            build_type: Debug
          - os: macos-latest
            generator: Ninja
            build_type: Release
          - os: windows-2022
            generator: "Visual Studio 17 2022"
            build_type: Debug
          - os: windows-2022
            generator: "Visual Studio 17 2022"
            build_type: Release

    runs-on: ${{ matrix.os }}
    env:
      INSTALL_PREFIX: ${{ github.workspace }}/opendaq_install

    steps:
      - name: Install Linux build dependencies (openDAQ's RTGen needs mono; FFmpeg-from-source needs a toolchain + pkg-config)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential pkg-config mono-runtime libmono-system-json-microsoft4.0-cil libmono-system-data4.0-cil

      - name: Install macOS build dependencies (openDAQ's RTGen needs mono)
        if: matrix.os == 'macos-latest'
        run: brew install mono

      - name: Set up MSVC dev environment (Windows only)
        if: matrix.os == 'windows-2022'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Checkout module
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.event.client_payload.branch || github.ref }}
          path: module

      - name: Overwrite opendaq_ref
        if: ${{ github.event.inputs.opendaq_ref != '' }}
        working-directory: module
        run: echo "${{ github.event.inputs.opendaq_ref }}" > opendaq_ref

      - name: Read openDAQ version
        shell: bash
        working-directory: module
        run: |
          opendaq_ref=$(cat opendaq_ref)
          echo "OPENDAQ_REF=$opendaq_ref" >> $GITHUB_ENV

      - name: Checkout openDAQ
        uses: actions/checkout@v4
        with:
          repository: openDAQ/openDAQ
          ref: ${{ env.OPENDAQ_REF }}
          path: opendaq

      - name: Configure, build and install openDAQ
        working-directory: opendaq
        run: |
          cmake -B build/output -S . -G "${{ matrix.generator }}" -DOPENDAQ_ENABLE_TESTS=OFF -DCMAKE_BUILD_TYPE="${{ matrix.build_type }}" -DCMAKE_INSTALL_PREFIX="${{ env.INSTALL_PREFIX }}"
          cmake --build build/output --config "${{ matrix.build_type }}"
          cmake --install build/output --config "${{ matrix.build_type }}"

      - name: Add DLL path (Windows only)
        if: matrix.os == 'windows-2022'
        run: echo "${{ env.INSTALL_PREFIX }}/bin" >> $env:GITHUB_PATH

      - name: Configure project with CMake
        working-directory: module
        run: cmake -B build/output -S . -G "${{ matrix.generator }}" -DDAQMODULES_FFMPEG_ENABLE_TESTS=ON -DDAQMODULES_FFMPEG_DEBUG_WARNINGS_AS_ERRORS=ON -DCMAKE_BUILD_TYPE="${{ matrix.build_type }}" -DopenDAQ_DIR="${{ env.INSTALL_PREFIX }}/lib/cmake/opendaq/"

      - name: Build project with CMake
        working-directory: module
        run: cmake --build build/output --config "${{ matrix.build_type }}"

      - name: Run project tests with CMake
        working-directory: module
        run: ctest --test-dir build/output --output-on-failure -C "${{ matrix.build_type }}"
